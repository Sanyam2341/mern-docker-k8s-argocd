apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: note-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 598917779747.dkr.ecr.us-east-1.amazonaws.com/note-app-frontend:v2
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        ports:
        - containerPort: 3000
        